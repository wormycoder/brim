<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>browse — brim.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #378ADD; --blue-light: #E6F1FB; --blue-border: #B5D4F4; --blue-dark: #185FA5; --green-light: #EAF3DE; --green-dark: #3B6D11; --amber-light: #FAEEDA; --amber-dark: #854F0B; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 999px; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; color: #1a1a1a; }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.5px; }
    .logo em { font-style: italic; color: var(--blue); }
    .nav-links { display: flex; gap: 28px; font-size: 13px; color: #666; }
    .nav-links a:hover { color: #1a1a1a; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .search { display: flex; align-items: center; gap: 8px; background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: var(--radius-full); padding: 8px 16px; width: 220px; }
    .search input { border: none; background: transparent; outline: none; font-size: 13px; color: #1a1a1a; width: 100%; font-family: 'DM Sans', sans-serif; }
    .search input::placeholder { color: #aaa; }
    .sign-btn { font-size: 13px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 7px 16px; background: var(--blue-light); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .browse-header { padding: 32px 28px 0; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
    .browse-header h1 { font-family: 'Instrument Serif', serif; font-size: 32px; font-weight: 400; letter-spacing: -0.5px; margin-bottom: 6px; }
    .browse-header h1 em { font-style: italic; color: var(--blue); }
    .browse-header p { font-size: 14px; color: #888; margin-bottom: 20px; }
    .browse-search { display: flex; align-items: center; gap: 8px; background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: var(--radius-full); padding: 12px 20px; max-width: 480px; margin-bottom: 20px; }
    .browse-search input { border: none; background: transparent; outline: none; font-size: 14px; color: #1a1a1a; width: 100%; font-family: 'DM Sans', sans-serif; }
    .browse-search input::placeholder { color: #aaa; }
    .cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 0; }
    .cats::-webkit-scrollbar { display: none; }
    .pill { padding: 8px 18px; border-radius: var(--radius-full); border: 0.5px solid rgba(0,0,0,0.12); font-size: 13px; color: #666; cursor: pointer; white-space: nowrap; background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .pill.on, .pill:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .browse-layout { display: flex; gap: 24px; padding: 28px; align-items: flex-start; }
    .filters { width: 220px; flex-shrink: 0; }
    .filter-group { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px; }
    .filter-group h4 { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; margin-bottom: 14px; }
    .filter-option { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; cursor: pointer; }
    .filter-option label { font-size: 13px; color: #444; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .filter-option input[type="checkbox"] { accent-color: #1a1a1a; width: 13px; height: 13px; }
    .price-inputs { display: flex; gap: 8px; align-items: center; }
    .price-input { flex: 1; border: 0.5px solid rgba(0,0,0,0.12); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #f5f5f3; outline: none; color: #1a1a1a; }
    .price-sep { font-size: 12px; color: #aaa; }
    .results { flex: 1; min-width: 0; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .results-count { font-size: 13px; color: #888; }
    .sort-select { border: 0.5px solid rgba(0,0,0,0.12); border-radius: var(--radius-full); padding: 7px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a1a; outline: none; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; display: block; }
    .card:hover { border-color: rgba(0,0,0,0.2); transform: translateY(-2px); }
    .card-img { width: 100%; aspect-ratio: 1; overflow: hidden; background: #f5f5f3; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .card:hover .card-img img { transform: scale(1.04); }
    .card-body { padding: 12px 14px; }
    .card-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-seller { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
    .card-price { font-size: 15px; font-weight: 500; }
    .msg-btn { font-size: 11px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-md); padding: 4px 10px; background: var(--blue-light); }
    .condition { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; border-radius: 4px; padding: 2px 7px; }
    .cond-new { background: var(--blue-light); color: var(--blue-dark); }
    .cond-like { background: var(--green-light); color: var(--green-dark); }
    .cond-good { background: var(--amber-light); color: var(--amber-dark); }
    .cond-fair { background: #f0f0ee; color: #555; }
    .skeleton { background: linear-gradient(90deg, #f0f0ee 25%, #e8e8e6 50%, #f0f0ee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sk-img { width: 100%; aspect-ratio: 1; background: #f0f0ee; }
    .sk-line { height: 13px; margin-bottom: 7px; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 48px; color: #bbb; font-size: 14px; }
    .footer { padding: 20px 28px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; background: #fff; margin-top: 24px; }
    .footer-logo { font-family: 'Instrument Serif', serif; font-size: 20px; }
    .footer-logo em { font-style: italic; color: var(--blue); }
    .footer-r { font-size: 12px; color: #aaa; }
    @media (max-width: 900px) { .filters { display: none; } .grid { grid-template-columns: repeat(2, 1fr); } .nav-links { display: none; } }
    @media (max-width: 500px) { .browse-layout { padding: 16px; } .browse-header { padding: 24px 16px 0; } .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo">brim<em>.</em></a>
    <div class="nav-links">
      <a href="browse.html" style="color:#1a1a1a;font-weight:500;">browse</a>
      <a href="sell.html">sell</a>
      <a href="#">how it works</a>
    </div>
    <div class="nav-right">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#aaa" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input placeholder="search anything..." type="text">
      </div>
      <a href="login.html" id="signInLink"><button class="sign-btn">sign in</button></a>
      <a href="profile.html" id="profileLink" style="display:none;font-size:13px;color:#888;">my profile →</a>
    </div>
  </nav>

  <div class="browse-header">
    <h1>browse <em>everything</em></h1>
    <p>Find unique items from real people in your community.</p>
    <div class="browse-search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#aaa" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input placeholder="search listings..." type="text" id="browseSearch">
    </div>
    <div class="cats">
      <button class="pill on" data-cat="all">all</button>
      <button class="pill" data-cat="electronics">electronics</button>
      <button class="pill" data-cat="clothing">clothing</button>
      <button class="pill" data-cat="home & garden">home & garden</button>
      <button class="pill" data-cat="collectibles">collectibles</button>
      <button class="pill" data-cat="sports">sports</button>
      <button class="pill" data-cat="books">books</button>
      <button class="pill" data-cat="art">art</button>
    </div>
  </div>

  <div class="browse-layout">
    <aside class="filters">
      <div class="filter-group">
        <h4>Condition</h4>
        <div class="filter-option"><label><input type="checkbox" data-cond="new"> New</label></div>
        <div class="filter-option"><label><input type="checkbox" data-cond="like new"> Like new</label></div>
        <div class="filter-option"><label><input type="checkbox" data-cond="good"> Good</label></div>
        <div class="filter-option"><label><input type="checkbox" data-cond="fair"> Fair</label></div>
      </div>
      <div class="filter-group">
        <h4>Price range</h4>
        <div class="price-inputs">
          <input class="price-input" type="number" placeholder="$min" id="priceMin">
          <span class="price-sep">—</span>
          <input class="price-input" type="number" placeholder="$max" id="priceMax">
        </div>
      </div>
    </aside>

    <div class="results">
      <div class="results-header">
        <span class="results-count" id="resultsCount">loading…</span>
        <select class="sort-select" id="sortSelect">
          <option value="newest">newest first</option>
          <option value="price-asc">price: low to high</option>
          <option value="price-desc">price: high to low</option>
        </select>
      </div>
      <div class="grid" id="grid">
        <div class="card"><div class="card-img sk-img skeleton"></div><div class="card-body"><div class="skeleton sk-line" style="width:80%"></div><div class="skeleton sk-line" style="width:50%"></div><div class="skeleton sk-line" style="width:30%"></div></div></div>
        <div class="card"><div class="card-img sk-img skeleton"></div><div class="card-body"><div class="skeleton sk-line" style="width:80%"></div><div class="skeleton sk-line" style="width:50%"></div><div class="skeleton sk-line" style="width:30%"></div></div></div>
        <div class="card"><div class="card-img sk-img skeleton"></div><div class="card-body"><div class="skeleton sk-line" style="width:80%"></div><div class="skeleton sk-line" style="width:50%"></div><div class="skeleton sk-line" style="width:30%"></div></div></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">brim<em>.</em></div>
    <div class="footer-r">full to the brim.</div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCZmGDUuv7P4XcEJ0Sj6SFjQVKqLeeSOKQ",
      authDomain: "brim-dfdf3.firebaseapp.com",
      projectId: "brim-dfdf3",
      storageBucket: "brim-dfdf3.firebasestorage.app",
      messagingSenderId: "414714365863",
      appId: "1:414714365863:web:90c9e68982af5559831882"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('signInLink').style.display = 'none';
        const pl = document.getElementById('profileLink');
        pl.style.display = 'block';
        pl.href = `profile.html?uid=${user.uid}`;
      }
    });

    let allListings = [];
    let activeCat = 'all';
    let searchQ = '';

    // Read URL params
    const params = new URLSearchParams(window.location.search);
    if (params.get('q')) { searchQ = params.get('q'); document.getElementById('browseSearch').value = searchQ; }

    function condClass(c) { return c==='new'?'cond-new':c==='like new'?'cond-like':c==='good'?'cond-good':'cond-fair'; }

    function renderCard(id, data) {
      const img = data.mainPhoto || (data.photos&&data.photos[0]) || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop';
      return `<a href="product.html?id=${id}" class="card">
        <div class="card-img"><img src="${img}" alt="${data.title}" loading="lazy"></div>
        <div class="card-body">
          <div class="card-name">${data.title}</div>
          <div class="card-seller">${data.sellerName||'seller'} &nbsp;·&nbsp; <span class="condition ${condClass(data.condition)}">${data.condition}</span></div>
          <div class="card-foot"><div class="card-price">$${Number(data.price).toFixed(2)}</div><div class="msg-btn" onclick="event.preventDefault();window.location.href='messages.html?listing=${id}&seller=${data.sellerId}'">message</div></div>
        </div></a>`;
    }

    function applyFilters() {
      const condChecked = [...document.querySelectorAll('[data-cond]:checked')].map(c => c.dataset.cond);
      const minPrice = parseFloat(document.getElementById('priceMin').value) || 0;
      const maxPrice = parseFloat(document.getElementById('priceMax').value) || Infinity;
      const sort = document.getElementById('sortSelect').value;

      let filtered = allListings.filter(({ data }) => {
        if (activeCat !== 'all' && data.category !== activeCat) return false;
        if (condChecked.length && !condChecked.includes(data.condition)) return false;
        if (data.price < minPrice || data.price > maxPrice) return false;
        if (searchQ && !data.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
        return true;
      });

      if (sort === 'price-asc') filtered.sort((a,b) => a.data.price - b.data.price);
      else if (sort === 'price-desc') filtered.sort((a,b) => b.data.price - a.data.price);

      const grid = document.getElementById('grid');
      document.getElementById('resultsCount').textContent = `${filtered.length} listing${filtered.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No listings match your filters. <a href="sell.html" style="color:var(--blue-dark);">List something!</a></div>';
        return;
      }
      grid.innerHTML = filtered.map(({id, data}) => renderCard(id, data)).join('');
    }

    async function loadAll() {
      try {
        const q = query(collection(db, 'listings'), where('sold','==',false), orderBy('createdAt','desc'));
        const snap = await getDocs(q);
        allListings = snap.docs.map(d => ({ id: d.id, data: d.data() }));
        applyFilters();
      } catch (err) {
        document.getElementById('grid').innerHTML = '<div class="empty-state">Couldn\'t load listings. Check Firestore rules.</div>';
        document.getElementById('resultsCount').textContent = '0 listings';
      }
    }

    // Events
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
        pill.classList.add('on');
        activeCat = pill.dataset.cat;
        applyFilters();
      });
    });
    document.getElementById('browseSearch').addEventListener('input', e => { searchQ = e.target.value; applyFilters(); });
    document.getElementById('sortSelect').addEventListener('change', applyFilters);
    document.querySelectorAll('[data-cond]').forEach(cb => cb.addEventListener('change', applyFilters));
    document.getElementById('priceMin').addEventListener('input', applyFilters);
    document.getElementById('priceMax').addEventListener('input', applyFilters);

    loadAll();
  </script>
</body>
</html>
