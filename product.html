<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>product — brim.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #378ADD; --blue-light: #E6F1FB; --blue-border: #B5D4F4; --blue-dark: #185FA5; --green-light: #EAF3DE; --green-dark: #3B6D11; --amber-light: #FAEEDA; --amber-dark: #854F0B; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 999px; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; color: #1a1a1a; }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.5px; }
    .logo em { font-style: italic; color: var(--blue); }
    .nav-links { display: flex; gap: 28px; font-size: 13px; color: #666; }
    .nav-links a:hover { color: #1a1a1a; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .sign-btn { font-size: 13px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 7px 16px; background: var(--blue-light); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .breadcrumb { padding: 14px 28px; font-size: 12px; color: #aaa; display: flex; gap: 8px; align-items: center; }
    .breadcrumb a { color: #888; }
    .breadcrumb a:hover { color: #1a1a1a; }
    .breadcrumb span { color: #ccc; }
    .product-layout { display: flex; gap: 48px; padding: 0 28px 48px; max-width: 1100px; margin: 0 auto; }
    .gallery { flex: 1; min-width: 0; }
    .main-img { width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg); overflow: hidden; background: #fff; border: 0.5px solid rgba(0,0,0,0.1); margin-bottom: 10px; }
    .main-img img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-row { display: flex; gap: 8px; }
    .thumb { width: 72px; height: 72px; border-radius: var(--radius-md); overflow: hidden; border: 0.5px solid rgba(0,0,0,0.1); cursor: pointer; background: #fff; flex-shrink: 0; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb.active { border: 1.5px solid #1a1a1a; }
    .product-info { width: 380px; flex-shrink: 0; }
    .product-badges { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
    .condition { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; border-radius: 4px; padding: 2px 7px; }
    .cond-new { background: var(--blue-light); color: var(--blue-dark); }
    .cond-like { background: var(--green-light); color: var(--green-dark); }
    .cond-good { background: var(--amber-light); color: var(--amber-dark); }
    .cond-fair { background: #f0f0ee; color: #555; }
    .category-tag { font-size: 11px; color: #aaa; background: #f0f0ee; border-radius: 4px; padding: 2px 8px; }
    .product-title { font-family: 'Instrument Serif', serif; font-size: 30px; font-weight: 400; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 12px; }
    .product-price { font-size: 32px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 24px; }
    .product-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 28px; border-top: 0.5px solid rgba(0,0,0,0.08); padding-top: 20px; }
    .btn-primary { width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: var(--radius-full); padding: 15px 28px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 10px; transition: background 0.15s; }
    .btn-primary:hover { background: #333; }
    .btn-kofi { width: 100%; background: #FF5E5B; color: #fff; border: none; border-radius: var(--radius-full); padding: 15px 28px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s; }
    .btn-kofi:hover { opacity: 0.9; }
    .btn-msg { width: 100%; background: var(--blue-light); color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 15px 28px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .btn-msg:hover { background: #d6eaf8; }
    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.08); margin: 24px 0; }
    .seller-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-lg); padding: 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .seller-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; color: #fff; flex-shrink: 0; }
    .seller-info { flex: 1; min-width: 0; }
    .seller-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .seller-meta { font-size: 12px; color: #888; }
    .view-profile { font-size: 12px; color: var(--blue-dark); font-weight: 500; white-space: nowrap; }
    .meta-row { display: flex; gap: 24px; margin-bottom: 8px; }
    .meta-item { font-size: 12px; color: #aaa; }
    .meta-item strong { color: #555; font-weight: 500; }
    .footer { padding: 20px 28px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; background: #fff; }
    .footer-logo { font-family: 'Instrument Serif', serif; font-size: 20px; }
    .footer-logo em { font-style: italic; color: var(--blue); }
    .footer-r { font-size: 12px; color: #aaa; }
    .skeleton { background: linear-gradient(90deg, #f0f0ee 25%, #e8e8e6 50%, #f0f0ee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .not-found { text-align: center; padding: 80px 28px; color: #888; }
    .not-found h2 { font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 12px; }
    @media (max-width: 900px) { .product-layout { flex-direction: column; padding: 0 16px 36px; } .product-info { width: 100%; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo">brim<em>.</em></a>
    <div class="nav-links">
      <a href="browse.html">browse</a>
      <a href="sell.html">sell</a>
      <a href="#">how it works</a>
    </div>
    <div class="nav-right">
      <a href="login.html" id="signInLink"><button class="sign-btn">sign in</button></a>
      <a href="profile.html" id="profileLink" style="display:none;font-size:13px;color:#888;">my profile →</a>
    </div>
  </nav>

  <div class="breadcrumb">
    <a href="index.html">home</a><span>›</span>
    <a href="browse.html">browse</a><span>›</span>
    <span id="breadcrumbTitle">loading…</span>
  </div>

  <div id="productContent">
    <!-- loaded dynamically -->
    <div class="product-layout">
      <div class="gallery">
        <div class="main-img skeleton" style="border:none;"></div>
      </div>
      <div class="product-info">
        <div class="skeleton" style="height:14px;width:30%;margin-bottom:14px;"></div>
        <div class="skeleton" style="height:36px;width:90%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:36px;width:40%;margin-bottom:24px;"></div>
        <div class="skeleton" style="height:80px;width:100%;margin-bottom:24px;border-radius:12px;"></div>
        <div class="skeleton" style="height:50px;width:100%;margin-bottom:10px;border-radius:999px;"></div>
        <div class="skeleton" style="height:50px;width:100%;border-radius:999px;"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">brim<em>.</em></div>
    <div class="footer-r">full to the brim.</div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCZmGDUuv7P4XcEJ0Sj6SFjQVKqLeeSOKQ",
      authDomain: "brim-dfdf3.firebaseapp.com",
      projectId: "brim-dfdf3",
      storageBucket: "brim-dfdf3.firebasestorage.app",
      messagingSenderId: "414714365863",
      appId: "1:414714365863:web:90c9e68982af5559831882"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        document.getElementById('signInLink').style.display = 'none';
        const pl = document.getElementById('profileLink');
        pl.style.display = 'block';
        pl.href = `profile.html?uid=${user.uid}`;
      }
    });

    function condClass(c) { return c==='new'?'cond-new':c==='like new'?'cond-like':c==='good'?'cond-good':'cond-fair'; }
    function timeAgo(ts) {
      if (!ts) return 'recently';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Date.now() - d.getTime();
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
      return Math.floor(diff/86400000) + 'd ago';
    }

    const listingId = new URLSearchParams(window.location.search).get('id');

    async function loadProduct() {
      if (!listingId) { showNotFound(); return; }
      try {
        const snap = await getDoc(doc(db, 'listings', listingId));
        if (!snap.exists()) { showNotFound(); return; }
        const data = snap.data();
        document.title = `${data.title} — brim.`;
        document.getElementById('breadcrumbTitle').textContent = data.title;
        renderProduct(listingId, data);
      } catch (err) {
        showNotFound();
      }
    }

    function renderProduct(id, data) {
      const photos = data.photos && data.photos.length ? data.photos : ['https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&h=800&fit=crop'];
      const thumbsHtml = photos.map((url, i) => `
        <div class="thumb ${i===0?'active':''}" onclick="switchImg(this,'${url}')">
          <img src="${url.replace('/upload/','/upload/w_200,h_200,c_fill/')}" alt="">
        </div>`).join('');

      const msgHref = currentUser
        ? `messages.html?listing=${id}&seller=${data.sellerId}`
        : `login.html?redirect=messages.html?listing=${id}%26seller=${data.sellerId}`;

      document.getElementById('productContent').innerHTML = `
        <div class="product-layout">
          <div class="gallery">
            <div class="main-img"><img id="mainImg" src="${photos[0]}" alt="${data.title}"></div>
            <div class="thumb-row">${thumbsHtml}</div>
          </div>
          <div class="product-info">
            <div class="product-badges">
              <span class="condition ${condClass(data.condition)}">${data.condition}</span>
              <span class="category-tag">${data.category || ''}</span>
            </div>
            <h1 class="product-title">${data.title}</h1>
            <div class="product-price">$${Number(data.price).toFixed(2)}</div>
            <div class="seller-card">
              <div class="seller-avatar">${(data.sellerName||'?')[0].toUpperCase()}</div>
              <div class="seller-info">
                <div class="seller-name">${data.sellerName || 'seller'}</div>
                <div class="seller-meta">listed ${timeAgo(data.createdAt)}</div>
              </div>
              <a href="profile.html?uid=${data.sellerId}" class="view-profile">view profile →</a>
            </div>
            ${data.kofiUrl ? `<a href="${data.kofiUrl}" target="_blank"><button class="btn-kofi">☕ buy via Ko-fi — $${Number(data.price).toFixed(2)}</button></a>` : ''}
            <a href="${msgHref}"><button class="btn-msg">message seller</button></a>
            <hr class="divider">
            <div class="meta-row">
              <div class="meta-item"><strong>Condition</strong><br>${data.condition}</div>
              <div class="meta-item"><strong>Listed</strong><br>${timeAgo(data.createdAt)}</div>
              ${data.category ? `<div class="meta-item"><strong>Category</strong><br>${data.category}</div>` : ''}
            </div>
            ${data.description ? `<hr class="divider"><p class="product-desc">${data.description.replace(/\n/g,'<br>')}</p>` : ''}
          </div>
        </div>`;

      // Thumb switching
      window.switchImg = (thumb, src) => {
        document.getElementById('mainImg').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      };
    }

    function showNotFound() {
      document.getElementById('productContent').innerHTML = `
        <div class="not-found">
          <h2>Listing not found</h2>
          <p>This item may have been sold or removed.</p>
          <a href="browse.html" style="color:var(--blue-dark);font-weight:500;display:inline-block;margin-top:16px;">browse all listings →</a>
        </div>`;
    }

    loadProduct();
  </script>
</body>
</html>
