<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>profile — brim.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #378ADD; --blue-light: #E6F1FB; --blue-border: #B5D4F4; --blue-dark: #185FA5; --green-light: #EAF3DE; --green-dark: #3B6D11; --amber-light: #FAEEDA; --amber-dark: #854F0B; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 999px; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; color: #1a1a1a; }
    a { text-decoration: none; color: inherit; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.5px; }
    .logo em { font-style: italic; color: var(--blue); }
    .nav-links { display: flex; gap: 28px; font-size: 13px; color: #666; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .sign-btn { font-size: 13px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 7px 16px; background: var(--blue-light); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-danger { font-size: 13px; font-weight: 500; color: #c0392b; border: 0.5px solid #f5c6c2; border-radius: var(--radius-full); padding: 7px 16px; background: #fdf0ef; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .profile-header { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 40px 28px 28px; }
    .profile-header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: flex-start; gap: 28px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 500; color: #fff; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-meta { flex: 1; }
    .profile-username { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; letter-spacing: -0.5px; margin-bottom: 4px; }
    .profile-bio { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 12px; max-width: 480px; }
    .profile-stats { display: flex; gap: 24px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 18px; font-weight: 500; }
    .stat-lbl { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; }
    .profile-actions { display: flex; gap: 10px; flex-direction: column; align-items: flex-end; }
    .btn-msg { font-size: 13px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 9px 20px; background: var(--blue-light); cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .btn-kofi-sm { font-size: 13px; color: #fff; background: #FF5E5B; border: none; border-radius: var(--radius-full); padding: 9px 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .btn-primary-sm { font-size: 13px; font-weight: 500; color: #fff; background: #1a1a1a; border: none; border-radius: var(--radius-full); padding: 9px 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .profile-body { padding: 28px; max-width: 900px; margin: 0 auto; display: flex; gap: 28px; align-items: flex-start; }
    .listings-col { flex: 1; min-width: 0; }
    .section-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; display: block; }
    .card:hover { border-color: rgba(0,0,0,0.2); transform: translateY(-2px); }
    .card-img { width: 100%; aspect-ratio: 1; overflow: hidden; background: #f5f5f3; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .card:hover .card-img img { transform: scale(1.04); }
    .card-body { padding: 10px 12px; }
    .card-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .card-price { font-size: 13px; font-weight: 500; }
    .condition { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; border-radius: 4px; padding: 2px 6px; }
    .cond-new { background: var(--blue-light); color: var(--blue-dark); }
    .cond-like { background: var(--green-light); color: var(--green-dark); }
    .cond-good { background: var(--amber-light); color: var(--amber-dark); }
    .cond-fair { background: #f0f0ee; color: #555; }
    .empty-listings { color: #bbb; font-size: 14px; padding: 24px 0; }
    .footer { padding: 20px 28px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; background: #fff; }
    .footer-logo { font-family: 'Instrument Serif', serif; font-size: 20px; }
    .footer-logo em { font-style: italic; color: var(--blue); }
    .footer-r { font-size: 12px; color: #aaa; }
    .skeleton { background: linear-gradient(90deg, #f0f0ee 25%, #e8e8e6 50%, #f0f0ee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @media (max-width: 900px) { .profile-body { flex-direction: column; padding: 16px; } .grid { grid-template-columns: repeat(2, 1fr); } .profile-header-inner { flex-wrap: wrap; } .profile-actions { flex-direction: row; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo">brim<em>.</em></a>
    <div class="nav-links">
      <a href="browse.html">browse</a>
      <a href="sell.html">sell</a>
      <a href="#">how it works</a>
    </div>
    <div class="nav-right" id="navRight">
      <a href="login.html"><button class="sign-btn">sign in</button></a>
    </div>
  </nav>

  <div class="profile-header">
    <div class="profile-header-inner" id="profileHeader">
      <div class="avatar skeleton" style="flex-shrink:0;"></div>
      <div class="profile-meta" style="flex:1;">
        <div class="skeleton" style="height:28px;width:200px;margin-bottom:8px;border-radius:4px;"></div>
        <div class="skeleton" style="height:14px;width:300px;margin-bottom:12px;border-radius:4px;"></div>
        <div class="skeleton" style="height:18px;width:150px;border-radius:4px;"></div>
      </div>
    </div>
  </div>

  <div class="profile-body">
    <div class="listings-col">
      <div class="section-label" id="listingsLabel">listings</div>
      <div class="grid" id="listingsGrid">
        <div class="card"><div class="card-img skeleton"></div><div class="card-body"><div class="skeleton" style="height:13px;width:80%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:40%;"></div></div></div>
        <div class="card"><div class="card-img skeleton"></div><div class="card-body"><div class="skeleton" style="height:13px;width:80%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:40%;"></div></div></div>
        <div class="card"><div class="card-img skeleton"></div><div class="card-body"><div class="skeleton" style="height:13px;width:80%;margin-bottom:6px;"></div><div class="skeleton" style="height:13px;width:40%;"></div></div></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-logo">brim<em>.</em></div>
    <div class="footer-r">full to the brim.</div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCZmGDUuv7P4XcEJ0Sj6SFjQVKqLeeSOKQ",
      authDomain: "brim-dfdf3.firebaseapp.com",
      projectId: "brim-dfdf3",
      storageBucket: "brim-dfdf3.firebasestorage.app",
      messagingSenderId: "414714365863",
      appId: "1:414714365863:web:90c9e68982af5559831882"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const targetUid = params.get('uid') || params.get('user');

    function condClass(c) { return c==='new'?'cond-new':c==='like new'?'cond-like':c==='good'?'cond-good':'cond-fair'; }

    onAuthStateChanged(auth, async currentUser => {
      const uid = targetUid || (currentUser ? currentUser.uid : null);
      if (!uid) { window.location.href = 'login.html'; return; }

      const isOwnProfile = currentUser && currentUser.uid === uid;

      // Nav
      if (currentUser) {
        document.getElementById('navRight').innerHTML = `
          <a href="profile.html?uid=${currentUser.uid}" style="font-size:13px;color:#888;">my profile</a>
          <button class="btn-danger" id="signOutBtn">sign out</button>`;
        document.getElementById('signOutBtn').addEventListener('click', async () => {
          await signOut(auth);
          window.location.href = 'index.html';
        });
      }

      // Load user doc
      try {
        const userSnap = await getDoc(doc(db, 'users', uid));
        const userData = userSnap.exists() ? userSnap.data() : { username: 'unknown', bio: '', kofiUrl: '' };

        // Render header
        const avatarContent = userData.avatarUrl
          ? `<img src="${userData.avatarUrl}" alt="">`
          : (userData.username || '?')[0].toUpperCase();

        document.getElementById('profileHeader').innerHTML = `
          <div class="avatar">${avatarContent}</div>
          <div class="profile-meta">
            <div class="profile-username">${userData.username || 'brim user'}</div>
            <div class="profile-bio">${userData.bio || (isOwnProfile ? '<a href="#" style="color:var(--blue-dark);">add a bio →</a>' : 'No bio yet.')}</div>
            <div class="profile-stats">
              <div class="stat"><div class="stat-val" id="statListings">—</div><div class="stat-lbl">listings</div></div>
              <div class="stat"><div class="stat-val">${userData.salesCount || 0}</div><div class="stat-lbl">sales</div></div>
            </div>
          </div>
          <div class="profile-actions">
            ${isOwnProfile
              ? `<a href="sell.html"><button class="btn-primary-sm">+ new listing</button></a>`
              : `<a href="messages.html?seller=${uid}"><button class="btn-msg">message</button></a>`}
            ${userData.kofiUrl ? `<a href="${userData.kofiUrl}" target="_blank"><button class="btn-kofi-sm">Ko-fi shop ↗</button></a>` : ''}
          </div>`;

        // Load listings
        const lq = query(collection(db, 'listings'), where('sellerId','==',uid), where('sold','==',false), orderBy('createdAt','desc'));
        const lSnap = await getDocs(lq);
        document.getElementById('statListings').textContent = lSnap.size;
        document.getElementById('listingsLabel').textContent = `active listings (${lSnap.size})`;

        if (lSnap.empty) {
          document.getElementById('listingsGrid').innerHTML = `<div class="empty-listings">${isOwnProfile ? 'No listings yet. <a href="sell.html" style="color:var(--blue-dark);">List your first item →</a>' : 'No active listings.'}</div>`;
        } else {
          document.getElementById('listingsGrid').innerHTML = lSnap.docs.map(d => {
            const data = d.data();
            const img = data.mainPhoto || (data.photos&&data.photos[0]) || '';
            return `<a href="product.html?id=${d.id}" class="card">
              <div class="card-img">${img ? `<img src="${img}" alt="" loading="lazy">` : ''}</div>
              <div class="card-body">
                <div class="card-name">${data.title}</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
                  <div class="card-price">$${Number(data.price).toFixed(2)}</div>
                  <span class="condition ${condClass(data.condition)}">${data.condition}</span>
                </div>
              </div></a>`;
          }).join('');
        }
      } catch (err) {
        console.error(err);
        document.getElementById('profileHeader').innerHTML = '<p style="color:#888;">Couldn\'t load profile.</p>';
      }
    });
  </script>
</body>
</html>
