<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>messages — brim.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #378ADD; --blue-light: #E6F1FB; --blue-border: #B5D4F4; --blue-dark: #185FA5; --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 999px; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f3; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); flex-shrink: 0; }
    .logo { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.5px; }
    .logo em { font-style: italic; color: var(--blue); }
    .nav-links { display: flex; gap: 28px; font-size: 13px; color: #666; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .sign-btn { font-size: 13px; font-weight: 500; color: var(--blue-dark); border: 0.5px solid var(--blue-border); border-radius: var(--radius-full); padding: 7px 16px; background: var(--blue-light); cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .messages-wrap { flex: 1; display: flex; overflow: hidden; }
    .convo-list { width: 300px; flex-shrink: 0; background: #fff; border-right: 0.5px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .convo-header { padding: 18px 20px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.08); flex-shrink: 0; }
    .convo-header h2 { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: 400; letter-spacing: -0.3px; margin-bottom: 12px; }
    .convo-scroll { flex: 1; overflow-y: auto; }
    .convo-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; border-bottom: 0.5px solid rgba(0,0,0,0.06); transition: background 0.1s; }
    .convo-item:hover, .convo-item.active { background: #f7f7f5; }
    .convo-item.active { background: var(--blue-light); }
    .convo-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #fff; flex-shrink: 0; }
    .convo-info { flex: 1; min-width: 0; }
    .convo-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .convo-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .convo-time { font-size: 11px; color: #bbb; flex-shrink: 0; }
    .chat-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f5f3; }
    .chat-header { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); padding: 16px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #fff; flex-shrink: 0; }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 500; }
    .chat-header-sub { font-size: 12px; color: #888; }
    .chat-scroll { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg-row { display: flex; gap: 10px; max-width: 70%; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #888; flex-shrink: 0; align-self: flex-end; }
    .msg-avatar.me { background: linear-gradient(135deg, #378ADD 0%, #185FA5 100%); color: #fff; }
    .msg-bubble { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 16px; border-bottom-left-radius: 4px; padding: 10px 14px; font-size: 14px; line-height: 1.5; color: #1a1a1a; }
    .msg-row.mine .msg-bubble { background: #1a1a1a; color: #fff; border-color: transparent; border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; color: #bbb; margin-top: 4px; }
    .msg-row.mine .msg-time { text-align: right; }
    .date-divider { text-align: center; font-size: 11px; color: #bbb; letter-spacing: 0.5px; margin: 4px 0; }
    .chat-input { background: #fff; border-top: 0.5px solid rgba(0,0,0,0.1); padding: 14px 20px; display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; }
    .chat-input textarea { flex: 1; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 20px; padding: 10px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; max-height: 120px; line-height: 1.5; color: #1a1a1a; background: #f7f7f5; }
    .chat-input textarea:focus { border-color: rgba(0,0,0,0.2); background: #fff; }
    .chat-input textarea::placeholder { color: #bbb; }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .send-btn:hover { background: #333; }
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #bbb; }
    .chat-empty-icon { font-size: 36px; opacity: 0.4; }
    .auth-wall { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 40px; }
    .auth-wall h2 { font-family: 'Instrument Serif', serif; font-size: 24px; font-weight: 400; }
    .auth-wall p { font-size: 14px; color: #888; }
    .btn-dark { background: #1a1a1a; color: #fff; border: none; border-radius: var(--radius-full); padding: 13px 28px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    @media (max-width: 700px) { .convo-list { display: none; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo">brim<em>.</em></a>
    <div class="nav-links">
      <a href="browse.html">browse</a>
      <a href="sell.html">sell</a>
    </div>
    <div class="nav-right" id="navRight">
      <a href="login.html"><button class="sign-btn">sign in</button></a>
    </div>
  </nav>

  <div class="messages-wrap" id="messagesWrap">
    <!-- Auth wall for logged out users -->
    <div class="auth-wall" id="authWall">
      <div class="chat-empty-icon">💬</div>
      <h2>Sign in to message sellers</h2>
      <p>You need a brim account to send and receive messages.</p>
      <a href="login.html?redirect=messages.html"><button class="btn-dark">sign in →</button></a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, addDoc, doc, getDoc, setDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCZmGDUuv7P4XcEJ0Sj6SFjQVKqLeeSOKQ",
      authDomain: "brim-dfdf3.firebaseapp.com",
      projectId: "brim-dfdf3",
      storageBucket: "brim-dfdf3.firebasestorage.app",
      messagingSenderId: "414714365863",
      appId: "1:414714365863:web:90c9e68982af5559831882"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    let currentUser = null;
    let activeConvId = null;
    let threadUnsub = null;

    function timeAgo(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const diff = Date.now() - d.getTime();
      if (diff < 60000) return 'now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
      return Math.floor(diff/86400000) + 'd';
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    onAuthStateChanged(auth, async user => {
      if (!user) return; // auth wall shown by default
      currentUser = user;
      document.getElementById('authWall').style.display = 'none';
      document.getElementById('navRight').innerHTML = `<a href="profile.html?uid=${user.uid}" style="font-size:13px;color:#888;">my profile →</a>`;
      renderApp();

      // If coming from product page with ?listing=X&seller=Y, open/create that convo
      const listingId = params.get('listing');
      const sellerId = params.get('seller');
      if (listingId && sellerId && sellerId !== user.uid) {
        await openOrCreateConvo(listingId, sellerId);
      }
    });

    async function renderApp() {
      document.getElementById('messagesWrap').innerHTML = `
        <div class="convo-list">
          <div class="convo-header"><h2>messages</h2></div>
          <div class="convo-scroll" id="convoScroll">
            <div style="padding:20px;font-size:13px;color:#bbb;">loading…</div>
          </div>
        </div>
        <div class="chat-pane" id="chatPane">
          <div class="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <div style="font-size:14px;">select a conversation</div>
          </div>
        </div>`;

      // Listen to all conversations the user is part of
      const q = query(collection(db, 'conversations'), where('participants','array-contains', currentUser.uid), orderBy('lastMessageAt','desc'));
      onSnapshot(q, snap => {
        const scroll = document.getElementById('convoScroll');
        if (snap.empty) { scroll.innerHTML = '<div style="padding:20px;font-size:13px;color:#bbb;">no conversations yet.</div>'; return; }
        scroll.innerHTML = snap.docs.map(d => {
          const data = d.data();
          const otherId = data.participants.find(p => p !== currentUser.uid);
          const otherName = data.participantNames?.[otherId] || 'user';
          const initial = otherName[0].toUpperCase();
          return `<div class="convo-item ${d.id===activeConvId?'active':''}" data-id="${d.id}" onclick="openConvo('${d.id}','${otherName}','${initial}')">
            <div class="convo-avatar">${initial}</div>
            <div class="convo-info">
              <div class="convo-name">${otherName}</div>
              <div class="convo-preview">${data.lastMessage||''}</div>
            </div>
            <div class="convo-time">${timeAgo(data.lastMessageAt)}</div>
          </div>`;
        }).join('');
      });
    }

    window.openConvo = function(convId, otherName, initial) {
      activeConvId = convId;
      // highlight active
      document.querySelectorAll('.convo-item').forEach(el => el.classList.toggle('active', el.dataset.id === convId));

      const pane = document.getElementById('chatPane');
      pane.innerHTML = `
        <div class="chat-header">
          <div class="chat-avatar">${initial}</div>
          <div class="chat-header-info">
            <div class="chat-header-name">${otherName}</div>
            <div class="chat-header-sub"><a href="profile.html?uid=" style="color:var(--blue-dark);">view profile →</a></div>
          </div>
        </div>
        <div class="chat-scroll" id="chatScroll"></div>
        <div class="chat-input">
          <textarea id="msgInput" placeholder="type a message…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8L14 2L8 14L7 9L2 8Z" fill="white"/></svg>
          </button>
        </div>`;

      // Unsubscribe from previous thread
      if (threadUnsub) threadUnsub();

      const threadQ = query(collection(db, 'conversations', convId, 'thread'), orderBy('sentAt', 'asc'));
      threadUnsub = onSnapshot(threadQ, snap => {
        const scroll = document.getElementById('chatScroll');
        if (!scroll) return;
        scroll.innerHTML = snap.docs.map(d => {
          const msg = d.data();
          const isMine = msg.senderId === currentUser.uid;
          const initial = isMine ? (currentUser.displayName||currentUser.email||'?')[0].toUpperCase() : otherName[0].toUpperCase();
          return `<div class="msg-row ${isMine?'mine':''}">
            <div class="msg-avatar ${isMine?'me':''}">${initial}</div>
            <div>
              <div class="msg-bubble">${msg.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
              <div class="msg-time">${formatTime(msg.sentAt)}</div>
            </div>
          </div>`;
        }).join('');
        scroll.scrollTop = scroll.scrollHeight;
      });
    };

    window.sendMessage = async function() {
      if (!activeConvId || !currentUser) return;
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = ''; input.style.height = 'auto';

      const myName = currentUser.displayName || currentUser.email.split('@')[0];
      try {
        await addDoc(collection(db, 'conversations', activeConvId, 'thread'), {
          senderId: currentUser.uid,
          senderName: myName,
          text,
          sentAt: serverTimestamp()
        });
        // Update last message on conversation doc
        await setDoc(doc(db, 'conversations', activeConvId), { lastMessage: text, lastMessageAt: serverTimestamp() }, { merge: true });
      } catch (err) {
        console.error('Send failed:', err);
      }
    };

    async function openOrCreateConvo(listingId, sellerId) {
      // Find existing conversation
      const q = query(collection(db, 'conversations'),
        where('participants','array-contains', currentUser.uid),
        where('listingId','==', listingId));
      const snap = await getDocs(q);
      
      let convId;
      if (!snap.empty) {
        convId = snap.docs[0].id;
      } else {
        // Get seller name
        const sellerSnap = await getDoc(doc(db, 'users', sellerId));
        const sellerName = sellerSnap.exists() ? sellerSnap.data().username : 'seller';
        const myName = currentUser.displayName || currentUser.email.split('@')[0];

        const convRef = await addDoc(collection(db, 'conversations'), {
          participants: [currentUser.uid, sellerId],
          participantNames: { [currentUser.uid]: myName, [sellerId]: sellerName },
          listingId,
          lastMessage: '',
          lastMessageAt: serverTimestamp()
        });
        convId = convRef.id;
      }
      
      // Wait a tick for the UI to render then open
      setTimeout(() => {
        const sellerSnap_name = params.get('sellerName') || 'seller';
        openConvo(convId, sellerSnap_name, sellerSnap_name[0]?.toUpperCase() || 'S');
      }, 500);
    }

    window.autoResize = function(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    };

    window.handleKey = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
  </script>
</body>
</html>
